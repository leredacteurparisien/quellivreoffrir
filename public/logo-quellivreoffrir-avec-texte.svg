<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160" viewBox="0 0 400 160">
  <title>Logo quellivreoffrir.fr — avec texte</title>
  <desc>Livre bleu canard avec ruban ocre, texte offrir en ocre</desc>

  <!-- Icône livre -->
  <g transform="translate(60, 85)">
    <path d="M0 0 L-32 -7 L-32 34 L0 26 Z" fill="none" stroke="#2a6b7c" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M0 0 L32 -7 L32 34 L0 26 Z" fill="none" stroke="#2a6b7c" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="0" y1="0" x2="0" y2="26" stroke="#2a6b7c" stroke-width="2.5"/>
    <path d="M-11 -7 Q0 -21 11 -7" fill="none" stroke="#c4622d" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-21" x2="0" y2="-7" stroke="#c4622d" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-5 -21 L-9 -30 M5 -21 L9 -30" fill="none" stroke="#c4622d" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Texte -->
  <text x="110" y="68" font-family="Georgia, serif" font-size="13" fill="#6b7280" letter-spacing="3">QUEL LIVRE</text>
  <text x="110" y="98" font-family="Georgia, serif" font-size="32" fill="#c4622d" letter-spacing="-0.5">offrir ?</text>
  <text x="110" y="116" font-family="Georgia, serif" font-size="10" fill="#9ca3af" letter-spacing="2">quellivreoffrir.fr</text>
</svg>
